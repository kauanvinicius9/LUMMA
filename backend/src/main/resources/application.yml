spring:
  datasource:
    url: jdbc:postgresql://localhost:8080/lumma
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    schemas: lumma
    locations: classpath:db/migration

server:
  port: 8080